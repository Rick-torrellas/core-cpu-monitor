name: main ci/cd pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Detecta versiones como v1.0.0    
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  
# Esto cancela ejecuciones anteriores si haces un push nuevo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 2. Ejecutar Linting
  CI:
    permissions:
      contents: write
    uses: ./.github/workflows/ci.yaml
  # 1. Ejecutar Formateo
  CD:
    needs: CI
    permissions:
      contents: read    # Necesario para leer el código
      id-token: write   # El que te está pidiendo el error
      pages: write      # El padre debe habilitar la capacidad de escribir en Pages
      packages: write   # Necesario para subir el paquete
    uses: ./.github/workflows/cd.yaml

